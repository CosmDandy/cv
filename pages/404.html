<!DOCTYPE html>
<!--
    Hi. CV typeset in LaTeX, glued by Jinja2 + GitHub Actions.
    Source: github.com/CosmDandy/cv.cosmdandy.dev
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — CV | Timofey Kondrashin</title>
    <meta name="description" content="Page not found">
    <meta name="theme-color" content="#000000">
    <meta name="color-scheme" content="dark">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="preload" href="fonts/Inter-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="fonts/Inter-SemiBold.woff2" as="font" type="font/woff2" crossorigin>
    <style>
        @font-face {
            font-family: 'Inter';
            font-weight: 400;
            font-display: block;
            src: url('fonts/Inter-Regular.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Inter';
            font-weight: 600;
            font-display: block;
            src: url('fonts/Inter-SemiBold.woff2') format('woff2');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-variant-numeric: tabular-nums;
            background: #000;
            color: #93a1a1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        .dot-bg {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(147, 161, 161, 0.25) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 0;
        }

        .cursor-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle at center,
                    rgba(237, 237, 237, 0.035) 0%,
                    rgba(237, 237, 237, 0.012) 35%,
                    transparent 60%);
            pointer-events: none;
            z-index: 10;
            transform: translate(-50%, -50%);
            transition: opacity 0.4s;
            opacity: 0;
        }

        .cursor-glow.visible { opacity: 1; }

        .not-found-bg {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(10rem, 32vw, 26rem);
            font-weight: 600;
            color: rgba(237, 237, 237, 0.035);
            letter-spacing: -0.06em;
            line-height: 1;
            text-align: center;
            pointer-events: none;
            user-select: none;
            z-index: 1;
            transform: translateZ(0);
            -webkit-font-smoothing: antialiased;
            animation: fadeUp 1s cubic-bezier(0.32, 0.72, 0, 1) backwards;
        }

        main {
            position: relative;
            z-index: 2;
            padding: 24px;
        }

        .not-found-message {
            font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
            font-size: 0.78rem;
            color: #93a1a1;
            margin-bottom: 32px;
            letter-spacing: 0.01em;
            line-height: 1.55;
            transform: translateZ(0);
            animation: fadeUp 0.65s cubic-bezier(0.32, 0.72, 0, 1) 80ms backwards;
        }

        a.cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #93a1a1;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 12px 18px;
            border: 1px solid rgba(147, 161, 161, 0.10);
            border-radius: 12px;
            transform: translateZ(0);
            transition:
                color 0.40s cubic-bezier(0.34, 1.56, 0.64, 1),
                border-color 0.40s cubic-bezier(0.34, 1.56, 0.64, 1),
                transform 0.40s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: fadeUp 0.65s cubic-bezier(0.32, 0.72, 0, 1) 160ms backwards;
        }

        a.cta:hover {
            color: #ededed;
            border-color: rgba(147, 161, 161, 0.20);
            transform: translate3d(0, -1px, 0);
        }

        .footer {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
            font-size: 0.72rem;
            letter-spacing: 0.02em;
            color: #586e75;
            z-index: 3;
            pointer-events: none;
            animation: fadeUp 0.65s cubic-bezier(0.32, 0.72, 0, 1) 240ms backwards;
        }

        .footer a {
            color: inherit;
            text-decoration: none;
            pointer-events: auto;
            transition: color 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .footer a:hover { color: #93a1a1; }
        .footer .sep { opacity: 0.5; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translate3d(0, 8px, 0); }
            to   { opacity: 1; transform: translate3d(0, 0, 0); }
        }

        @media (max-width: 480px) {
            .footer { bottom: 16px; font-size: 0.7rem; }
            .cursor-glow { display: none; }
            .not-found-bg {
                align-items: flex-start;
                padding-top: 15vh;
                color: rgba(237, 237, 237, 0.16);
                letter-spacing: -0.02em;
                transform: translateZ(0) scaleY(1.5);
                transform-origin: top center;
                -webkit-mask-image: linear-gradient(to top, black 60%, transparent 100%);
                mask-image: linear-gradient(to top, black 60%, transparent 100%);
            }
        }
    </style>
</head>
<body>
    <div class="dot-bg"></div>
    <div class="cursor-glow" id="cursor-glow"></div>
    <div class="not-found-bg">404</div>

    <main>
        <p class="not-found-message">We can't reach this part of the network right now.</p>
        <a href="/" class="cta">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
            Head home or stay a while
        </a>
    </main>

    <footer class="footer">
        <span>error 404</span>
        <span class="sep">·</span>
        <a href="/">head home</a>
        <span class="sep">·</span>
        <span>not found</span>
    </footer>

    <script>
        const cursorGlow = document.getElementById('cursor-glow');
        const dotsEl = document.querySelector('.dot-bg');
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let cursorX = mouseX, cursorY = mouseY;
        let dotsX = 0, dotsY = 0;

        document.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursorGlow.classList.add('visible');
        });

        document.addEventListener('mouseleave', () => {
            cursorGlow.classList.remove('visible');
        });

        (function animate() {
            cursorX += (mouseX - cursorX) * 0.15;
            cursorY += (mouseY - cursorY) * 0.15;
            cursorGlow.style.left = cursorX + 'px';
            cursorGlow.style.top = cursorY + 'px';

            if (!prefersReducedMotion) {
                const targetDotsX = (mouseX / window.innerWidth - 0.5) * 10;
                const targetDotsY = (mouseY / window.innerHeight - 0.5) * 10;
                dotsX += (targetDotsX - dotsX) * 0.05;
                dotsY += (targetDotsY - dotsY) * 0.05;
                dotsEl.style.backgroundPosition = `${dotsX.toFixed(2)}px ${dotsY.toFixed(2)}px`;
            }

            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>
